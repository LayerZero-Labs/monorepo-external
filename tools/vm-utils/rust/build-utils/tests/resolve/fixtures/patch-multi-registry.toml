[package]
name = "my-crate"
version = "0.1.0"
edition = "2021"

[dependencies]
anchor-lang = { version = "0.32.1" }

[patch.crates-io]
anchor-lang = { git = "https://github.com/example/anchor.git", rev = "deadbeef" }

[patch."https://github.com/solana-labs/solana.git"]
solana-program = { path = "../solana-program" }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
overflow-checks = true
