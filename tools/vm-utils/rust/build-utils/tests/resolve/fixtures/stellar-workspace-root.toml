[workspace]
resolver = "2"
members = ["endpoint-v2", "message-libs/*", "workers/*"]

[workspace.package]
edition = "2021"
version = "0.0.1"
license = "MIT"

[workspace.dependencies]
soroban-sdk = { version = "25.1.1" }
endpoint-v2 = { path = "endpoint-v2", default-features = false }
message-lib-common = { path = "message-libs/message-lib-common" }
simple-message-lib = { path = "message-libs/simple-message-lib" }

[profile.release]
opt-level = "z"
