[package]
name = "onesig"
version = "0.0.1"
description = "Created with Anchor"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "onesig"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = ["custom-heap"]
idl-build = ["anchor-lang/idl-build"]
custom-heap = []
custom-panic = []
anchor-debug = []


[dependencies]
anchor-lang = { workspace = true, features = ["event-cpi"] }
hex-literal = "0.4.1"
proc-macro2 = "=1.0.106"
solana-keccak-hasher = "3.1.0"
solana-secp256k1-recover = "3.1.0"

[dev-dependencies]
hex = "0.4.3"
solana-keccak-hasher = { version = "3.1.0", features = ["sha3"] }
